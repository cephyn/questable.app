name: quest_cards
description: "A new Flutter project."

# Prevent accidental publishing to pub.dev.
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.8.1 <4.0.0"

dependencies:
  auto_size_text: 3.0.0
  cloud_firestore: 6.4.0
  cloud_functions: 6.3.0
  collection: 1.19.1
  custom_adaptive_scaffold: 3.0.1
  crypto: 3.0.7
  file_picker: 12.0.0-beta.2
  firebase_analytics: 12.4.0
  firebase_app_check: 0.4.4
  firebase_auth: 6.5.0
  firebase_core: 4.8.0
  firebase_remote_config: 6.5.0
  firebase_storage: 13.4.0
  firebase_ui_auth: 3.0.1
  fl_chart: 1.2.0
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  fluttertoast: 9.0.0
  google_fonts: 8.1.0
  google_sign_in: 7.2.0
  infinite_scroll_pagination: 5.1.1
  mime: 2.0.0
  provider: 6.1.5+1
  url_launcher: 6.3.2
  json_theme: 11.0.0
  rxdart: 0.28.0
  shared_preferences: 2.5.5
  http: 1.6.0
  gpt_markdown: 1.1.7
  flutter_typeahead: 6.0.0
  intl: 0.20.2
  go_router: 17.2.3
  share_plus: 13.1.0
  simple_icons: 14.6.1 # Add simple_icons
  firebase_ai: 3.12.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: 6.0.0

flutter:
  uses-material-design: true

  # Enable generation of localized Strings from arb files.
  generate: true

  assets:
    # Add assets from the images directory to the application.
    - assets/images/
    - assets/icons/
    - assets/appainter_theme_green.json
    # Branding samples used for a visual refresh
    - samples/questable_logo.png
    - samples/questable_ico.png
    - samples/questable_concept.png
